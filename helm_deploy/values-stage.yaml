---
# Per environment values which override defaults in hmpps-manage-users-temp-rewrite/values.yaml

generic-service:
  replicaCount: 2

  ingress:
    host: manage-users-temp-rewrite-stage.hmpps.service.justice.gov.uk
    modsecurity_audit_enabled: true
    className: modsec-non-prod

  env:
    INGRESS_URL: "https://manage-users-temp-rewrite-stage.hmpps.service.justice.gov.uk"
    HMPPS_AUTH_URL: "https://sign-in-stage.hmpps.service.justice.gov.uk/auth"
    TOKEN_VERIFICATION_API_URL: "https://token-verification-api-stage.prison.service.justice.gov.uk"
    MANAGE_USERS_API_URL: 'https://manage-users-api-stage.hmpps.service.justice.gov.uk'
    ENVIRONMENT_NAME: DEV
    AUDIT_ENABLED: "false"
    MANAGE_USER_ALLOW_LIST_ENABLED: false

generic-prometheus-alerts:
  alertSeverity: hmpps_tech_non_prod
